<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wallet Pro | ניהול זיכויים</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050811; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body {
            background: linear-gradient(rgba(5, 8, 17, 0.85), rgba(5, 8, 17, 0.85)),
                        url('https://images.unsplash.com/photo-1519567241046-7f570eee3ce6?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            min-height: 100vh;
        }
        .form-control-custom { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 12px; color: #fff; padding: 10px; }
        .form-control-custom::placeholder { color: rgba(255,255,255,0.4); }
        .category-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; cursor: pointer; transition: 0.3s; }
        .category-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        .section { display: none; } .section.active { display: block; }
        .expiry-alert { font-size: 0.8rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .urgent { background: #ef4444; color: white; }
        .soon { background: #f59e0b; color: #000; }
    </style>
</head>
<body>

<nav class="p-3 border-bottom border-secondary mb-4">
    <div class="container d-flex justify-content-between">
        <span class="fs-3 fw-bold">WALLET<span class="text-primary">PRO</span></span>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm d-none" onclick="logout()">התנתק</button>
    </div>
</nav>

<div class="container">
    <div id="loginSection" class="section active text-center">
        <div class="p-5 rounded-5 d-inline-block" style="background: var(--glass); min-width: 320px;">
            <h2 class="mb-4">כניסה למערכת</h2>
            <input type="email" id="loginEmail" class="form-control-custom w-100 mb-3" placeholder="אימייל">
            <input type="password" id="loginPassword" class="form-control-custom w-100 mb-4" placeholder="סיסמה">
            <button class="btn btn-primary w-100" onclick="login()">התחבר</button>
        </div>
    </div>

    <div id="dashboardSection" class="section">
        <div class="mb-3">
            <h4 class="fw-bold mb-1">הוספת זיכוי חדש</h4>
            <p class="text-white-50 small mb-0">מלא את הפרטים ולחץ "שמור זיכוי" כדי להוסיף זיכוי לרשימה</p>
        </div>
        <div class="p-4 rounded-4 mb-5" style="background: rgba(255,255,255,0.02); border: 1px solid var(--border);">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="small text-white mb-1">שם החנות</label>
                    <input type="text" id="storeName" class="form-control-custom w-100" placeholder="למשל: זארה, פוקס...">
                </div>
                <div class="col-md-2">
                    <label class="small text-white mb-1">קטגוריה</label>
                    <select id="category" class="form-control-custom w-100">
                        <option value="" disabled selected>בחירת קטגוריה...</option>
                        <option value="ביגוד">ביגוד ואופנה</option>
                        <option value="אוכל">אוכל ומסעדות</option>
                        <option value="פארם">פארם וטיפוח</option>
                        <option value="חשמל">חשמל ואלקטרוניקה</option>
                        <option value="אחר">אחר</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="small text-white mb-1">סכום (₪)</label>
                    <input type="number" id="amount" class="form-control-custom w-100" placeholder="0">
                </div>
                <div class="col-md-2">
                    <label class="small text-white mb-1">תאריך תפוגה</label>
                    <input type="date" id="expiry" class="form-control-custom w-100">
                </div>
                <div class="col-md-1 text-center">
                    <label class="small text-white mb-1 d-block">תמונה</label>
                    <!-- לפני צילום: כפתור מצלמה -->
                    <div id="cameraBtn">
                        <button class="btn btn-light rounded-circle p-2" onclick="openCamera()" title="צלם קבלה"><i class="bi bi-camera"></i></button>
                    </div>
                    <!-- אחרי צילום: תצוגה מקדימה + כפתורי פעולה -->
                    <div id="photoPreviewArea" class="d-none">
                        <img id="photoPreview" src="" style="width:50px; height:50px; object-fit:cover; border-radius:8px;">
                        <div class="mt-1">
                            <button class="btn btn-outline-light btn-sm" onclick="openCamera()">צלם שוב</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 py-2" onclick="addItem()">שמור זיכוי</button>
                </div>
            </div>
        </div>
        <h3 class="mb-4 fw-bold">הקטגוריות שלך</h3>
        <div id="categoriesGrid" class="row g-4"></div>
    </div>

    <div id="storeViewSection" class="section">
        <button class="btn btn-link text-white mb-3" onclick="showSection('dashboardSection')">← חזור לקטגוריות</button>
        <h2 id="currentCategoryTitle" class="mb-4 text-primary"></h2>
        <div id="storesList"></div>
    </div>

    <div id="creditsViewSection" class="section">
        <button class="btn btn-link text-white mb-3" id="backToStoresBtn">← חזור לחנויות</button>
        <h2 id="currentStoreTitle" class="mb-4"></h2>
        <div id="creditsGrid" class="row g-4"></div>
    </div>
</div>

<!-- מודל התראת זיכויים שפגים בקרוב -->
<div class="modal fade" id="expiryAlertModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-white rounded-4 p-4" style="background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15);">
            <div class="modal-header border-0 pb-2">
                <h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>התראה: זיכויים שפגים בקרוב</h5>
            </div>
            <div class="modal-body pt-0">
                <p class="text-white-50 small mb-3">הזיכויים הבאים יפוגו בתוך חודשיים:</p>
                <div id="expiryAlertList"></div>
            </div>
            <div class="modal-footer border-0 pt-2">
                <button class="btn btn-warning w-100 rounded-pill" data-bs-dismiss="modal">הבנתי, אטפל בזה</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="camModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-dark p-4"><video id="video" width="100%" autoplay class="rounded-3 mb-3"></video><button class="btn btn-primary w-100" onclick="takePhoto()">צלם</button></div></div></div>
<div class="modal fade" id="imgModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content bg-transparent text-center"><img id="fullImg" src="" class="img-fluid rounded-4 shadow-lg"><button class="btn btn-light mt-3" data-bs-dismiss="modal">סגור</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = window.location.origin || '';
    let token = localStorage.getItem('token') || '';
    let allItems = [];
    let capturedImageBlob = null;

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    if(token) {
        document.getElementById('logoutBtn').classList.remove('d-none');
        showSection('dashboardSection');
        loadData();
        // שמירת מצב התחלתי בהיסטוריה של הדפדפן
        history.replaceState({ section: 'dashboard' }, '');
    }

    // כפתור חזור של הדפדפן/נייד
    window.addEventListener('popstate', function(e) {
        const state = e.state;
        if (!state || state.section === 'dashboard') {
            showSection('dashboardSection');
        } else if (state.section === 'storeView') {
            openCategory(state.cat, false);
        } else if (state.section === 'creditsView') {
            openStore(state.store, state.cat, false);
        }
    });

    async function loadData() {
        try {
            const res = await fetch(`${API}/credit/`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            allItems = data.filter(i => !i.isUsed);
            renderCategories();
            checkExpiryAlerts();
        } catch (e) { console.error("טעינה נכשלה", e); }
    }

    function checkExpiryAlerts() {
        const now = new Date();
        const twoMonthsFromNow = new Date();
        twoMonthsFromNow.setMonth(twoMonthsFromNow.getMonth() + 2);

        // מסנן זיכויים שתוקפם יפוג בתוך חודשיים מהיום
        const expiringSoon = allItems.filter(i => {
            if (!i.expiryDate) return false;
            const exp = new Date(i.expiryDate);
            return exp >= now && exp <= twoMonthsFromNow;
        });

        if (expiringSoon.length === 0) return;

        // בניית הרשימה בתוך המודל
        const list = document.getElementById('expiryAlertList');
        list.innerHTML = expiringSoon.map(i => {
            const exp = new Date(i.expiryDate);
            const diffDays = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
            const color = diffDays <= 7 ? '#ef4444' : diffDays <= 30 ? '#f59e0b' : '#6366f1';
            return `
                <div class="d-flex justify-content-between align-items-center mb-2 p-2 rounded-3" style="background: rgba(255,255,255,0.05);">
                    <div>
                        <span class="fw-bold">${i.storeName}</span>
                        <span class="text-white-50 small me-2">(${i.category || 'אחר'})</span>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold">₪${i.amount}</div>
                        <div class="small" style="color: ${color}">עוד ${diffDays} ימים</div>
                    </div>
                </div>`;
        }).join('');

        new bootstrap.Modal(document.getElementById('expiryAlertModal')).show();
    }

    function renderCategories() {
        const categories = [...new Set(allItems.map(i => i.category || 'אחר'))];
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = categories.map(cat => {
            const items = allItems.filter(i => i.category === cat);
            const sum = items.reduce((a, b) => a + Number(b.amount), 0);
            return `<div class="col-md-4"><div class="category-card" onclick="openCategory('${cat}')"><h4 class="fw-bold">${cat}</h4><div class="text-white-50">${items.length} זיכויים | ₪${sum}</div></div></div>`;
        }).join('');
    }

    function openCategory(cat, addHistory = true) {
        const catItems = allItems.filter(i => i.category === cat);
        const stores = [...new Set(catItems.map(i => i.storeName))];
        document.getElementById('currentCategoryTitle').innerText = cat;
        const list = document.getElementById('storesList');
        list.innerHTML = stores.map(store => {
            const storeItems = catItems.filter(i => i.storeName === store);
            const sum = storeItems.reduce((a, b) => a + Number(b.amount), 0);
            return `<div class="p-3 mb-2 rounded-3 border border-secondary" style="cursor:pointer" onclick="openStore('${store}', '${cat}')">
                <span class="fs-5 fw-bold">${store}</span> - ${storeItems.length} זיכויים (₪${sum})</div>`;
        }).join('');
        showSection('storeViewSection');
        if (addHistory) history.pushState({ section: 'storeView', cat }, '');
    }

    function openStore(store, cat, addHistory = true) {
        const storeItems = allItems.filter(i => i.storeName === store && i.category === cat);
        document.getElementById('currentStoreTitle').innerText = store;
        document.getElementById('backToStoresBtn').onclick = () => openCategory(cat, true);
        const grid = document.getElementById('creditsGrid');
        grid.innerHTML = storeItems.map(item => {
            const diff = item.expiryDate ? Math.ceil((new Date(item.expiryDate) - new Date()) / (86400000)) : null;
            let alert = '';
            if(diff !== null) {
                if(diff < 0) alert = '<div class="expiry-alert urgent">פג תוקף!</div>';
                else if(diff <= 7) alert = `<div class="expiry-alert soon">פוקע בעוד ${diff} ימים</div>`;
            }
            return `<div class="col-md-4"><div class="p-4 rounded-4" style="background:rgba(255,255,255,0.05); border:1px solid var(--border)">
                ${alert}
                ${item.image ? `<img src="${item.image}" class="w-100 rounded-3 mb-3" style="height:120px; object-fit:cover; cursor:pointer" onclick="openFullImage('${item.image}')">` : ''}
                <div class="fs-2 fw-bold">₪${item.amount}</div>
                <div class="text-white-50 small mb-3">תוקף: ${item.expiryDate ? new Date(item.expiryDate).toLocaleDateString('he-IL') : 'ללא'}</div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success btn-sm w-100" onclick="useItem('${item._id}')">מימוש</button>
                    <button class="btn btn-outline-danger btn-sm w-100" onclick="deleteItem('${item._id}')">מחק</button>
                </div>
            </div></div>`;
        }).join('');
        showSection('creditsViewSection');
        if (addHistory) history.pushState({ section: 'creditsView', store, cat }, '');
    }

    async function addItem() {
        const name = document.getElementById('storeName').value;
        const cat = document.getElementById('category').value;
        const amt = document.getElementById('amount').value;
        if(!name || !cat || !amt) return alert("אנא מלא שם, קטגוריה וסכום");

        const formData = new FormData();
        formData.append('storeName', name);
        formData.append('category', cat);
        formData.append('amount', amt);
        formData.append('expiryDate', document.getElementById('expiry').value);
        if(capturedImageBlob) formData.append('image', capturedImageBlob, 'receipt.jpg');

        try {
            const res = await fetch(`${API}/credit/`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
            if(res.ok) { alert("נשמר!"); location.reload(); }
            else { alert("שגיאה בשמירה. וודא שהשרת ב-Render מעודכן."); }
        } catch (e) { alert("שגיאת רשת"); }
    }

    async function useItem(id) { if(confirm("לממש ולהסיר?")) { await fetch(`${API}/credit/${id}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } }); loadData(); showSection('dashboardSection'); } }
    async function deleteItem(id) { if(confirm("למחוק?")) { await fetch(`${API}/credit/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); loadData(); showSection('dashboardSection'); } }
    
    function openCamera() {
        new bootstrap.Modal(document.getElementById('camModal')).show();
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => document.getElementById('video').srcObject = s);
    }

    function takePhoto() {
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(b => {
            capturedImageBlob = b;
            // הצגת תצוגה מקדימה של התמונה שצולמה
            document.getElementById('photoPreview').src = URL.createObjectURL(b);
            document.getElementById('cameraBtn').classList.add('d-none');
            document.getElementById('photoPreviewArea').classList.remove('d-none');
            bootstrap.Modal.getInstance(document.getElementById('camModal')).hide();
            v.srcObject.getTracks().forEach(t => t.stop());
        }, 'image/jpeg');
    }

    funבטל את ction clearPhoto() {
        // ביטול התמונה וחזרה לכפתור המצלמה
        capturedImageBlob = null;
        document.getElementById('photoPreview').src = '';
        document.getElementById('photoPreviewArea').classList.add('d-none');
        document.getElementById('cameraBtn').classList.remove('d-none');
    }
    function openFullImage(s) { document.getElementById('fullImg').src = s; new bootstrap.Modal(document.getElementById('imgModal')).show(); }
    async function login() { 
        const email = document.getElementById('loginEmail').value; const pass = document.getElementById('loginPassword').value;
        const res = await fetch(`${API}/user/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
        const data = await res.json(); if(res.ok) { localStorage.setItem('token', data.token); location.reload(); } else alert("שגיאה");
    }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
